name: lint

on: [push, pull_request]

jobs:
  psscriptanalyzer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning,Error
          $results | Format-Table -AutoSize
          if ($results | Where-Object Severity -eq 'Error') { exit 1 }

      - name: Validate controls.json
        shell: pwsh
        run: |
          $config = Get-Content controls.json -Raw | ConvertFrom-Json
          Write-Host "$($config.controls.Count) controls loaded"
          $ids = $config.controls.id
          if (($ids | Sort-Object -Unique).Count -ne $ids.Count) { throw "Duplicate control IDs" }
